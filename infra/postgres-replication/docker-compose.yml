services:
  primary:
    image: postgres:16
    container_name: campusconnect_primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: campusconnect
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5436:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./primary/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - campusconnect_replication_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d campusconnect" ]
      interval: 10s
      timeout: 5s
      retries: 10

  replica1:
    image: postgres:16
    container_name: campusconnect_replica1
    restart: unless-stopped
    environment:
      POSTGRES_DB: campusconnect
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      PGDATA: /var/lib/postgresql/data/pgdata
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator123
      PRIMARY_HOST: primary
      PRIMARY_PORT: 5432
    ports:
      - "5437:5432"
    volumes:
      - replica1_data:/var/lib/postgresql/data
      - ./replica1/setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh
    depends_on:
      primary:
        condition: service_healthy
    command: >
      bash -c " chmod +x /docker-entrypoint-initdb.d/setup-replica.sh && /docker-entrypoint-initdb.d/setup-replica.sh "
    networks:
      - campusconnect_replication_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d campusconnect" ]
      interval: 10s
      timeout: 5s
      retries: 10

  replica2:
    image: postgres:16
    container_name: campusconnect_replica2
    restart: unless-stopped
    environment:
      POSTGRES_DB: campusconnect
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      PGDATA: /var/lib/postgresql/data/pgdata
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator123
      PRIMARY_HOST: primary
      PRIMARY_PORT: 5432
    ports:
      - "5438:5432"
    volumes:
      - replica2_data:/var/lib/postgresql/data
      - ./replica2/setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh
    depends_on:
      primary:
        condition: service_healthy
    command: >
      bash -c " chmod +x /docker-entrypoint-initdb.d/setup-replica.sh && /docker-entrypoint-initdb.d/setup-replica.sh "
    networks:
      - campusconnect_replication_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d campusconnect" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  primary_data:
  replica1_data:
  replica2_data:


networks:
  campusconnect_replication_net:
    driver: bridge

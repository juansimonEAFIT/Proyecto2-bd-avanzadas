# Configuración principal de PostgreSQL para el nodo líder

listen_addresses = '*'
port = 5432
max_connections = 100

# Se indica explícitamente dónde está el archivo pg_hba.conf montado en Docker
hba_file = '/etc/postgresql/pg_hba.conf'

# Parámetros necesarios para replicación
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on

# Se deja activado para que luego pueda compararse con otros modos
# Si más adelante quieren hacer pruebas más estrictas,
# se puede combinar con synchronous_standby_names
synchronous_commit = on

# Parámetro útil para transacciones preparadas
# Aunque el caso fuerte de 2PC será en sharding,
# dejarlo activo evita limitaciones posteriores
max_prepared_transactions = 20

# Configuración básica de logs
logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql.log'
log_statement = 'none'
log_min_messages = warning
services:
  # Emulador de CockroachDB basado en PostgreSQL (para evitar el clock skew de Docker Windows)
  # Acepta conexiones en 26257 y simula el entorno para los experimentos en Python.
  cockroach-node1:
    image: postgres:15-alpine
    container_name: cockroach-node1
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ""
      POSTGRES_DB: defaultdb
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "26257:5432"
    volumes:
      - cockroach1_data:/var/lib/postgresql/data
    networks:
      - social_network

volumes:
  cockroach1_data:

networks:
  social_network:
    driver: bridge

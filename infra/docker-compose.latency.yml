version: '3.9'

services:
  # Network simulation container - adds latency
  # Este compose simula particiones de red y latencia
  
  cockroach-node1:
    image: cockroachdb/cockroach:latest
    container_name: cockroach-node1-latency
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach1_latency_data:/cockroach/cockroach-data
    networks:
      social_network:
        ipv4_address: 10.0.0.2
    command: start --insecure --listen-addr=0.0.0.0:26357 --http-addr=0.0.0.0:8080 --join=10.0.0.2:26357,10.0.0.3:26357,10.0.0.4:26357
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

  cockroach-node2:
    image: cockroachdb/cockroach:latest
    container_name: cockroach-node2-latency
    ports:
      - "26258:26257"
      - "8081:8080"
    volumes:
      - cockroach2_latency_data:/cockroach/cockroach-data
    networks:
      social_network:
        ipv4_address: 10.0.0.3
    command: start --insecure --listen-addr=0.0.0.0:26357 --http-addr=0.0.0.0:8080 --join=10.0.0.2:26357,10.0.0.3:26357,10.0.0.4:26357
    depends_on:
      - cockroach-node1
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

  cockroach-node3:
    image: cockroachdb/cockroach:latest
    container_name: cockroach-node3-latency
    ports:
      - "26259:26257"
      - "8082:8080"
    volumes:
      - cockroach3_latency_data:/cockroach/cockroach-data
    networks:
      social_network:
        ipv4_address: 10.0.0.4
    command: start --insecure --listen-addr=0.0.0.0:26357 --http-addr=0.0.0.0:8080 --join=10.0.0.2:26357,10.0.0.3:26357,10.0.0.4:26357
    depends_on:
      - cockroach-node1
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

volumes:
  cockroach1_latency_data:
  cockroach2_latency_data:
  cockroach3_latency_data:

networks:
  social_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
